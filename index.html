<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXP-AI Dashboard</title>
    <style>
        /* Dunkles, modernes Design passend zum Widget */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #1c1c1e; 
            color: #ffffff; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        h2 { margin-top: 10px; font-size: 22px; color: #f2f2f7; }
        p { color: #aeaeac; font-size: 14px; text-align: center; margin-bottom: 20px; }

        /* Der CoinGecko-Style Rahmen für das KI-Widget */
        .widget-container { 
            width: 100%; 
            max-width: 480px; 
            height: 550px; 
            border-radius: 16px; 
            overflow: hidden; 
            border: 1px solid #2c2c2e; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.5); 
            background: #2c2c2e;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>

    <h2>EXP-AI Hub</h2>
    <p>Kostenlose KI-Antworten ohne Login und ohne API-Key.</p>

    <!-- Das eingebettete Widget -->
    <div class="widget-container">
        <iframe src="https://duckduckgo.com"></iframe>
    </div>

</body>
</html>
