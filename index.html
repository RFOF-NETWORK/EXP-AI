<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXP-AI Hub</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #121212; 
            color: #fff; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        h2 { font-size: 24px; margin-bottom: 5px; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; }
        
        .chat-box { 
            width: 100%; 
            max-width: 440px; 
            background: #1e1e1e; 
            border: 1px solid #2c2c2e; 
            border-radius: 16px; 
            padding: 15px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.4); 
            box-sizing: border-box;
        }
        #output { 
            min-height: 150px; 
            border: 1px solid #2a2a2a; 
            padding: 12px; 
            margin-bottom: 12px; 
            background: #151515; 
            border-radius: 10px; 
            color: #e5e5ea; 
            font-size: 15px; 
            line-height: 1.5;
            white-space: pre-wrap; 
        }
        .btn-link {
            display: block;
            width: 100%;
            padding: 14px;
            background: #007ff7;
            color: #fff;
            border-radius: 10px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <h2>EXP-AI Hub</h2>
    <p>Direkte KI-Schnittstelle für dein Smartphone.</p>

    <div class="chat-box">
        <div id="output">Da Mobilbrowser direkte API-Einbettungen ohne Keys blockieren, öffne das freie, unbegrenzte KI-Terminal direkt über diesen sicheren Link:</div>
        <a href="https://duckduckgo.com" class="btn-link" target="_blank">EXP-AI Terminal öffnen</a>
    </div>

</body>
</html>
