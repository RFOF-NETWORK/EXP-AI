<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXP-AI Hub</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #121212; 
            color: #fff; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        h2 { font-size: 24px; margin-bottom: 5px; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; }
        
        /* Das Chat-Fenster direkt auf deiner Seite styled */
        .chat-box { 
            width: 100%; 
            max-width: 440px; 
            background: #1e1e1e; 
            border: 1px solid #2c2c2e; 
            border-radius: 16px; 
            padding: 15px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.4); 
            box-sizing: border-box;
        }
        #output { 
            min-height: 180px; 
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid #2a2a2a; 
            padding: 12px; 
            margin-bottom: 12px; 
            background: #151515; 
            border-radius: 10px; 
            color: #e5e5ea; 
            font-size: 15px; 
            line-height: 1.5;
            white-space: pre-wrap; 
        }
        .input-area { display: flex; gap: 8px; }
        input { 
            flex: 1; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid #3a3a3c; 
            background: #2c2c2e; 
            color: #fff; 
            font-size: 15px;
        }
        input:focus { border-color: #007ff7; outline: none; }
        button { 
            padding: 12px 18px; 
            border: none; 
            background: #007ff7; 
            color: #fff; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 15px;
        }
        button:disabled { background: #3a3a3c; color: #8e8e93; }
    </style>
</head>
<body>

    <h2>EXP-AI Hub</h2>
    <p>Direkte KI-Antworten ohne Login und ohne API-Key.</p>

    <div class="chat-box">
        <div id="output">Schreib mir eine Nachricht...</div>
        <div class="input-area">
            <input type="text" id="prompt" placeholder="Code oder Frage eingeben...">
            <button id="send-btn" onclick="askAI()">Senden</button>
        </div>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById("prompt");
            const output = document.getElementById("output");
            const btn = document.getElementById("send-btn");
            const text = input.value.trim();
            
            if (!text) return;
            
            output.innerText = "EXP-AI überlegt...";
            btn.disabled = true;
            
            try {
                // Holt die Antwort über ein freies, offenes API-Gateway ohne Keys
                const response = await fetch(`https://pollinations.ai{encodeURIComponent(text)}?model=openai`);
                const reply = await response.text();
                
                output.innerText = reply;
                input.value = "";
            } catch (err) {
                output.innerText = "Fehler: Verbindung zur KI fehlgeschlagen.";
            } finally {
                btn.disabled = false;
            }
        }

        // Enter-Taste auf der Handy-Tastatur abfangen
        document.getElementById("prompt").addEventListener("keypress", function(e) {
            if (e.key === "Enter") askAI();
        });
    </script>
</body>
</html>
